version: "3.8"
services:
  postgres:
    image: postgres:16
    ports: "5432:5432"
    environment:
       POSTGRES_USER: postgres
       POSTGRES_PASSWORD: password
       POSTGRES_DB: leewah
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

redis:
  image: redis:7-alpine
  ports: "6379:6379"
  volumes:
    - ./redis-data:/data

volumes:
    postgres-data:
    redis-data: